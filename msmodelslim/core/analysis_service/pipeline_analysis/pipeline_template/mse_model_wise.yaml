process:
  - type: binary_operator_model_wise
    metrics: mse_model_wise
    quant_modules: ${quant_modules}
    configs:
      - type: linear_quant
        qconfig:
          act:
            scope: per_block
            dtype: mxfp4
            symmetric: true
            method: minmax
          weight:
            scope: per_block
            dtype: mxfp4
            symmetric: true
            method: minmax
        include: ${quant_modules}
