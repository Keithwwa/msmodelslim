apiversion: multimodal_vlm_modelslim_v1
metadata:
  config_id: qwen3_6_27B_w8a8
  score: 100
  verified_tags:
    Qwen3.6-27B:
      - - vLLM_Ascend
        - Atlas_A2_Inference
      - - vLLM_Ascend
        - Atlas_A3_Inference
  label:
    w_bit: 8
    a_bit: 8
    is_sparse: False
    kv_cache: False

default_w8a8_dynamic: &default_w8a8_dynamic
  act:
    scope: "per_token"
    dtype: "int8"
    symmetric: True
    method: "minmax"
  weight:
    scope: "per_channel"
    dtype: "int8"
    symmetric: True
    method: "minmax"

spec:
  process:
    - type: "linear_quant"
      qconfig: *default_w8a8_dynamic
      include:
        - "*self_attn*"
        - "*mlp*"
        - "*visual.blocks*"
        - "*linear_attn.in_proj_qkv*"
        - "*linear_attn.in_proj_z*"
      exclude:
        - "*linear_fc2*"
  save:
    - type: "ascendv1_saver"
      part_file_size: 4
  dataset: "calibImages"  # Short name: auto-searches in lab_calib/
  default_text: "Describe this image in detail."
