apiversion: modelslim_v1

metadata:
  config_id: hy3_w8a8
  score: 90
  verified_tags:
    Hy3:
      - - vLLM_Ascend
        - Atlas_A2_Inference
      - - vLLM_Ascend
        - Atlas_A3_Inference
  label:
    w_bit: 8
    a_bit: 8
    is_sparse: False
    kv_cache: False

default_w8a8_dynamic: &default_w8a8_dynamic
  act:
    scope: "per_token"
    dtype: "int8"
    symmetric: True
    method: "minmax"
  weight:
    scope: "per_channel"
    dtype: "int8"
    symmetric: True
    method: "minmax"
spec:
  process:
    - type: "linear_quant"
      qconfig: *default_w8a8_dynamic
      include:
        - "*"
      exclude:
        - "lm_head"
        - "*.router.gate"
        - "*.mlp.expert_bias"
  save:
    - type: "ascendv1_saver"
      part_file_size: 4
