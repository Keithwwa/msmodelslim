apiversion: modelslim_v1
metadata:
  config_id: minimax_m27_w8a8c8
  score: 95
  verified_tags:
    MiniMax-M2.7:
      - [vllm-ascend, Atlas_A3_Interface]
  label:
    w_bit: 8
    a_bit: 8
    is_sparse: False
    kv_cache: True

default_w8a8_dynamic: &default_w8a8_dynamic
  act:
    scope: "per_token"
    dtype: "int8"
    symmetric: True
    method: "minmax"
  weight:
    scope: "per_channel"
    dtype: "int8"
    symmetric: True
    method: "minmax"

spec:
  process:
    - type: "quarot"
      export_extra_info: True
    - type: "linear_quant"
      qconfig: *default_w8a8_dynamic
      include:
        - "*block_sparse_moe.experts*"
        - "*self_attn*"
    - type: "dynamic_cache"
      qconfig:
        scope: "per_channel"
        dtype: "int8"
        symmetric: True
        method: "minmax"
      include:
        - "*"
  dataset: qwen3_cot.json
  save:
    - type: "ascendv1_saver"
      part_file_size: 4
