              - PruneConfig: "zh/api_reference/python_api_v0/pruning_apis/PruneConfig/add_blocks_params.md"
          - 蒸馏 API:
              - KnowledgeDistillConfig: "zh/api_reference/python_api_v0/distillation_apis/KnowledgeDistillConfig/add_inter_soft_label.md"
